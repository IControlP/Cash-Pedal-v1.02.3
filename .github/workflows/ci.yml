name: CI

# Runs on every push to every branch so Railway's "Wait for CI" setting can
# gate deploys on it: a commit whose build or TCO verification fails is never
# deployed, and the live site keeps running the last good deploy.
on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Production build
        run: npm run build
      - name: TCO / maintenance accuracy verification
        run: node scripts/verify-tco.mjs
