name: Production smoke test

# Hourly end-to-end check that cashpedal.io is actually working: every route
# renders and the public API endpoints respond. On failure it opens (or
# updates) a tracking issue; on recovery it closes the issue automatically.
on:
  schedule:
    - cron: "23 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: smoke-test
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Playwright
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium
      - name: Run smoke test
        id: smoke
        run: |
          set +e
          OUTPUT=$(node scripts/smoke-test.mjs 2>&1)
          CODE=$?
          echo "$OUTPUT"
          {
            echo "output<<EOF"
            echo "$OUTPUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "failed=$([ $CODE -ne 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          exit $CODE
      - name: Open or update failure issue
        if: failure() && steps.smoke.outputs.failed == 'true'
        uses: actions/github-script@v7
        env:
          REPORT_OUTPUT: ${{ steps.smoke.outputs.output }}
        with:
          script: |
            const title = "🔴 Production smoke test failing on cashpedal.io";
            const body = [
              `The scheduled smoke test failed at ${new Date().toISOString()}.`,
              "",
              "```",
              process.env.REPORT_OUTPUT,
              "```",
              "",
              `[Workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
            ].join("\n");
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "smoke-test",
            });
            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["smoke-test"],
              });
            }
      - name: Close failure issue on recovery
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "🔴 Production smoke test failing on cashpedal.io";
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "smoke-test",
            });
            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `✅ Recovered — smoke test passing again as of ${new Date().toISOString()}.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: "closed",
              });
            }
