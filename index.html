<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <!-- viewport-fit=cover lets content extend under notches; safe-area insets are honored in CSS -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Cash Pedal — Know the true cost of owning any vehicle before you sign." />

    <!-- Mobile browser chrome / rendering -->
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0f0520" />
    <!-- Stop iOS from turning prices/mileage numbers into tap-to-call links -->
    <meta name="format-detection" content="telephone=no" />
    <!-- Standalone / add-to-home-screen behavior on mobile -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Cash Pedal" />

    <!-- Open Graph (link previews when shared from Instagram / Facebook / Messenger) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Cash Pedal" />
    <meta property="og:url" content="https://cashpedal.io/" />
    <meta property="og:title" content="Cash Pedal" />
    <meta property="og:description" content="Know the true cost of owning any vehicle before you sign." />
    <!-- TODO: add a 1200x630 PNG at /og-image.png for rich large-image previews -->

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Cash Pedal" />
    <meta name="twitter:description" content="Know the true cost of owning any vehicle before you sign." />

    <title>Cash Pedal</title>
    <!-- DNS prefetch for third-party analytics origins so their scripts
         resolve faster once they load asynchronously after first paint. -->
    <link rel="dns-prefetch" href="https://www.clarity.ms" />
    <link rel="dns-prefetch" href="https://connect.facebook.net" />
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Non-blocking font load: the CSS is preloaded at high priority but does
         not hold up the render tree. onload swaps it in as a stylesheet once
         it arrives, so LCP text can paint immediately with the system font
         while the web font downloads in the background (font-display:swap). -->
    <link rel="preload"
      href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet" /></noscript>

        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window, document, "clarity", "script", "x7nktllrep");
    </script>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-65PBP0W12S"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-65PBP0W12S', { send_page_view: false });
    </script>
    <!-- Meta Pixel -->
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      fbq('init', '1771464733854543');
      // PageView is fired by the SPA router (src/utils/analytics.js) on every
      // route change, including initial load — firing it here too would
      // double-count the first PageView.
    </script>
  </head>
  <body>
    <noscript><img height="1" width="1" style="display:none"

</html>
